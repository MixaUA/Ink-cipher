<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ink Cipher: Hero Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0ede4;font-family:Georgia,serif;min-height:100vh}
h1{text-align:center;font-size:22px;font-weight:400;color:#1a1a1a;padding:24px 0 4px;letter-spacing:0.08em}
.subtitle{text-align:center;font-size:13px;color:#888;margin-bottom:20px;font-family:sans-serif}
.tabs{display:flex;justify-content:center;gap:0;margin-bottom:24px}
.tab{padding:9px 32px;font-size:14px;font-family:sans-serif;border:0.5px solid #bbb;background:#e8e4da;color:#666;cursor:pointer;transition:all .2s}
.tab:first-child{border-radius:8px 0 0 8px}
.tab:last-child{border-radius:0 8px 8px 0}
.tab.active{background:#fff;color:#1a1a1a;border-color:#999}
.panel{display:none;flex-direction:column;align-items:center;gap:16px;padding:0 16px 32px}
.panel.active{display:flex}
canvas{border-radius:12px;background:#f8f5ee;display:block}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
input[type=number],input[type=text]{height:38px;padding:0 14px;font-size:15px;border-radius:8px;border:0.5px solid #bbb;background:#fff;color:#1a1a1a;font-family:Georgia,serif}
input[type=number]{width:150px}
input[type=text]{width:280px}
button{height:38px;padding:0 20px;font-size:13px;font-family:sans-serif;font-weight:500;border-radius:8px;border:0.5px solid #999;background:#fff;color:#1a1a1a;cursor:pointer;white-space:nowrap}
button:hover{background:#ede9e0}
button.primary{background:#1a1a1a;color:#f8f5ee;border-color:#1a1a1a}
button.primary:hover{background:#333}
.info{font-size:12px;color:#999;font-family:monospace;text-align:center}
.phrase-out{font-size:17px;color:#1a1a1a;text-align:center;font-style:italic;min-height:26px;max-width:500px;line-height:1.6}
.status{font-size:13px;font-family:sans-serif;text-align:center;min-height:20px;color:#666}
.status.ok{color:#2a7a2a}
.status.err{color:#a02020}
video{border-radius:12px;width:320px;height:320px;object-fit:cover;background:#111}
.db-wrap{width:100%;max-width:560px;background:#fff;border-radius:12px;border:0.5px solid #ddd;padding:16px}
.db-wrap h3{font-size:13px;font-family:sans-serif;font-weight:500;color:#888;margin-bottom:12px;letter-spacing:0.05em}
.db-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto}
.db-entry{display:flex;gap:8px;align-items:center}
.db-entry .eid{font-family:monospace;font-size:13px;color:#888;min-width:52px}
.db-entry .etxt{font-size:14px;color:#1a1a1a;flex:1;font-family:Georgia,serif;font-style:italic}
.db-entry button{height:28px;padding:0 10px;font-size:12px}
.add-row{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:0.5px solid #eee;flex-wrap:wrap}
.add-row input[type=number]{width:100px;height:34px;font-size:13px}
.add-row input[type=text]{flex:1;min-width:180px;height:34px;font-size:13px}
.add-row button{height:34px}
.scan-overlay{position:relative;display:inline-block;width:320px;height:320px}
video{position:absolute;top:0;left:0;z-index:1}
#decCanvas{position:absolute;top:0;left:0;z-index:2;background:transparent;display:block;pointer-events:none}
.scan-line{position:absolute;left:10px;right:10px;height:2px;background:rgba(255,80,80,0.7);border-radius:1px;animation:scanmove 2s ease-in-out infinite;z-index:3;top:20px}
@keyframes scanmove{0%,100%{top:20px}50%{top:290px}}

.terminal-wrap{width:320px;background:#1e1e1e;border-radius:8px;padding:12px;box-shadow:inset 0 0 6px rgba(0,0,0,0.5);margin-top:10px}
.terminal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;color:#aaa;font-size:11px;font-family:sans-serif}
.terminal-head span{font-weight:bold;letter-spacing:0.05em}
.terminal-head div{display:flex;gap:6px}
.terminal-head button{height:22px;padding:0 8px;font-size:10px;background:#333;color:#ccc;border:0.5px solid #555;border-radius:4px}
.terminal-head button:hover{background:#444;color:#fff}
.terminal-body{font-family:monospace;font-size:11px;color:#00ff00;max-height:100px;overflow-y:auto;white-space:pre-wrap;line-height:1.4}
</style>
</head>
<body>
<h1>✦ Ink Cipher ✦</h1>
<p class="subtitle">Клякса-Герой — кодуй емоції та тексти у векторі</p>

<div class="tabs">
  <div class="tab active" onclick="switchTab('enc')">Кодер</div>
  <div class="tab" onclick="switchTab('dec')">Декодер</div>
  <div class="tab" onclick="switchTab('db')">База фраз</div>
</div>

<div class="panel active" id="tab-enc">
  <canvas id="encCanvas" width="480" height="480"></canvas>
  <div class="row">
    <input type="number" id="encId" value="42" min="0" max="65535" placeholder="ID 0–65535"/>
    <button class="primary" onclick="encode()">Намалювати Героя</button>
    <button onclick="downloadPNG()">Зберегти PNG</button>
  </div>
  <div class="info" id="encInfo"></div>
  <div class="phrase-out" id="encPhrase"></div>
</div>

<div class="panel" id="tab-dec">
  <div class="scan-overlay">
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="decCanvas" width="320" height="320"></canvas>
    <div class="scan-line" id="scanLine" style="display:none"></div>
  </div>

  <div class="row" style="margin-top:10px">
    <button class="primary" onclick="startCam()">Увімкнути камеру</button>
    <button onclick="stopCam()">Зупинити</button>
  </div>
  <div class="status" id="decStatus">Очікування запуску...</div>
  <div class="phrase-out" id="decPhrase"></div>

  <div class="terminal-wrap">
    <div class="terminal-head">
      <span>LOG TERMINAL</span>
      <div>
        <button onclick="copyLog()">Копіювати</button>
        <button onclick="clearLog()">Очистити</button>
      </div>
    </div>
    <div class="terminal-body" id="logBody">--- Очікування камери ---</div>
  </div>
</div>

<div class="panel" id="tab-db">
  <div class="db-wrap">
    <h3>БАЗА ФРАЗ</h3>
    <div class="db-list" id="dbList"></div>
    <div class="add-row">
      <input type="number" id="newId" placeholder="ID" min="0" max="65535"/>
      <input type="text" id="newPhrase" placeholder="Текст фрази..."/>
      <button onclick="addEntry()">Додати</button>
    </div>
  </div>
</div>

<script>
/* ── База фраз ── */
let DB = {
  0:"Початок усього — тиша перед першим словом.",
  1:"Зірки пам'ятають кожну дитячу мрію.",
  7:"Ліс дихає разом з тобою, варто лише зупинитись.",
  13:"Кожна крапля дощу несе своє ім'я.",
  42:"Відповідь на всі питання — справді сорок два!",
  99:"За горизонтом живуть дракони і добрі велетні.",
  256:"Магія криється у звичайних числах.",
  1000:"Тисяча кроків починається з одного подиху.",
  65535:"Останній рядок найстарішої казки світу."
};

/* ── Геометричні Константи ── */
const W=480, H=480, CX=240, CY=240;
const ANCHOR_R = 155; 
const ANCHOR_SIZE = 14;
const N_DATA = 16;

// Нижня точка трикутника (оригінальний ANCHOR_ANGLES був [90, 210, 330] у градусах)
// В радіанах нижній гострий кут відповідає 90 градусам (Math.PI / 2)
const START_ANGLE = Math.PI / 2; 

let lastLoggedId = null;

function mkRng(seed) {
  let s = (seed ^ 0xDEADBEEF) >>> 0;
  return () => { s = Math.imul(1664525, s) + 1013904223 >>> 0; return s / 4294967296; };
}

/* ── Художні декоративні бризки за межами клякси ── */
function drawOuterSplashes(ctx, rng) {
  ctx.save();
  ctx.fillStyle = '#0a0a0a';
  for (let i = 0; i < 24; i++) {
    const a = rng() * Math.PI * 2;
    // Малюємо бризки далеко — на відстані від 115 до 145 пікселів (поза межами клякси)
    const r = 115 + rng() * 30; 
    ctx.globalAlpha = 0.15 + rng() * 0.4;
    ctx.beginPath();
    ctx.arc(CX + Math.cos(a)*r, CY + Math.sin(a)*r, 1 + rng()*3, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

/* ── Малювання живих очей персонажа в центрі ── */
function drawHeroEyes(ctx, rng) {
  ctx.save();
  
  // Позиція лівого і правого ока відносно центру клякси
  const eyeSpacing = 14;
  const eyeY = -6;
  
  const lx = CX - eyeSpacing, rx = CX + eyeSpacing;
  const ly = CY + eyeY, ry = CY + eyeY;
  const eyeRadius = 6.5;

  // Білки очей
  ctx.fillStyle = '#f8f5ee';
  ctx.beginPath(); ctx.arc(lx, ly, eyeRadius, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(rx, ry, eyeRadius, 0, Math.PI*2); ctx.fill();

  // Живий випадковий погляд зіниць (трохи рандому)
  const lookX = (rng() - 0.5) * 3;
  const lookY = (rng() - 0.5) * 2;

  // Зіниці
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.arc(lx + lookX, ly + lookY, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(rx + lookX, ry + lookY, 3, 0, Math.PI*2); ctx.fill();

  // Бліки в очах для милоти
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(lx + lookX - 1, ly + lookY - 1, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(rx + lookX - 1, ry + lookY - 1, 1, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

/* ── Генерація єдиного тіла клякси на базі 16 біт ── */
function drawHeroBody(ctx, id, rng) {
  const bits = [];
  for (let i = 15; i >= 0; i--) bits.push((id >> i) & 1);

  const baseR = 64;   // Внутрішнє базове коло
  const stepPts = 64; // Кількість точок для плавності кривих Безьє
  const pts = [];

  for (let s = 0; s < stepPts; s++) {
    const angleFromStart = (s / stepPts) * Math.PI * 2;
    const globalAngle = START_ANGLE + angleFromStart;

    // Шукаємо найближчий інформаційний промінь з 16 можливих
    const exactBitIdx = (angleFromStart / (Math.PI * 2) * N_DATA);
    const baseIdx = Math.floor(exactBitIdx) % N_DATA;
    const nextIdx = (baseIdx + 1) % N_DATA;
    const t = exactBitIdx - Math.floor(exactBitIdx);

    // Плавно інтерпулюємо радіус між сусідніми бітами
    const bitVal1 = bits[baseIdx];
    const bitVal2 = bits[nextIdx];
    const smoothBit = bitVal1 * (1 - t) + bitVal2 * t;

    // Виступ (1) = до 96 пікселів, Впадина (0) = до 52 пікселів
    let targetR = baseR + (smoothBit ? 32 : -12);

    // Додаємо мікро-хвилі, щоб клякса виглядала природно і гармонійно
    targetR += Math.sin(angleFromStart * 8) * 3 + (rng() - 0.5) * 4;

    pts.push({
      x: CX + Math.cos(globalAngle) * targetR,
      y: CY + Math.sin(globalAngle) * targetR
    });
  }

  // Малюємо суцільну кляксу через плавну криву
  ctx.save();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 0; i < stepPts; i++) {
    const p = pts[i], pn = pts[(i+1)%stepPts];
    ctx.lineTo((p.x + pn.x)/2, (p.y + pn.y)/2);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawAnchor(ctx, cx, cy) {
  ctx.save();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.arc(cx, cy, ANCHOR_SIZE, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f8f5ee';
  ctx.beginPath(); ctx.arc(cx, cy, ANCHOR_SIZE * 0.4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.arc(cx, cy, ANCHOR_SIZE * 0.15, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

/* ── ГОЛОВНИЙ КОДЕР ── */
function drawSymbol(id) {
  const canvas = document.getElementById('encCanvas');
  const ctx = canvas.getContext('2d');
  const rng = mkRng(id ^ 0xABC123);

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f8f5ee';
  ctx.fillRect(0, 0, W, H);

  // 1. Малюємо тіло героя з бітовими хвилями
  drawHeroBody(ctx, id, rng);

  // 2. Вживляємо очі в центр
  drawHeroEyes(ctx, rng);

  // 3. Розкидуємо декоративний шум назовні
  drawOuterSplashes(ctx, rng);

  // 4. Малюємо 3 якорі строго по вершинах трикутника
  // Кути в градусах: 90 (нижній), 210 (лівий верхній), 330 (правий верхній)
  const angles = [90, 210, 330].map(d => d * Math.PI / 180);
  for (const a of angles) {
    const ax = CX + Math.cos(a) * ANCHOR_R;
    const ay = CY + Math.sin(a) * ANCHOR_R;
    drawAnchor(ctx, ax, ay);
  }
}

function encode() {
  const id = Math.max(0, Math.min(65535, parseInt(document.getElementById('encId').value)||0));
  drawSymbol(id);
  const bits = [];
  for (let i = 15; i >= 0; i--) bits.push((id>>i)&1);
  document.getElementById('encInfo').textContent =
    `ID ${id}  ·  ${bits.slice(0,8).join('')} ${bits.slice(8).join('')}`;
  const p = DB[id];
  document.getElementById('encPhrase').textContent = p ? `"${p}"` : '(немає у базі)';
}

function downloadPNG() {
  const id = document.getElementById('encId').value || '0';
  const a = document.createElement('a');
  a.download = `ink-hero-${id}.png`;
  a.href = document.getElementById('encCanvas').toDataURL('image/png');
  a.click();
}

/* ── АВТОМАТИЧНИЙ ДЕКОДЕР (МАТРЬОШКА РАДАРІВ) ── */
let camStream = null, scanTimer = null;

async function startCam() {
  try {
    const video = document.getElementById('camVideo');
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 640 } }
    });
    video.srcObject = camStream;
    document.getElementById('scanLine').style.display = 'block';
    logMsg('Роботизований радар запущено. Шукаю Героя...');
    scanTimer = setInterval(scanFrame, 300);
  } catch(e) {
    document.getElementById('decStatus').className = 'status err';
    document.getElementById('decStatus').textContent = 'Помилка камери: ' + e.message;
  }
}

function stopCam() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  document.getElementById('scanLine').style.display = 'none';
  document.getElementById('decStatus').className = 'status';
  document.getElementById('decStatus').textContent = 'Сканування зупинено';
  const dc = document.getElementById('decCanvas');
  dc.getContext('2d').clearRect(0, 0, dc.width, dc.height);
}

function scanFrame() {
  const video = document.getElementById('camVideo');
  if (!camStream || video.readyState < 2) return;
  const dc = document.getElementById('decCanvas');
  const ctx = dc.getContext('2d');
  ctx.drawImage(video, 0, 0, 320, 320);
  tryDecode(ctx, dc.width, dc.height);
}

function tryDecode(ctx, W, H) {
  const img = ctx.getImageData(0, 0, W, H);
  const data = img.data;

  function lum(x, y) {
    x = Math.round(x); y = Math.round(y);
    if (x < 0 || x >= W || y < 0 || y >= H) return 255;
    const i = (y * W + x) * 4;
    return data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
  }

  // Обчислення динамічного порогу яскравості
  let totalLum = 0;
  for (let i = 0; i < data.length; i += 32) {
    totalLum += data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
  }
  const avgLum = totalLum / (data.length / 32);
  const THRESH = Math.min(110, avgLum * 0.78);

  // Знаходження темних об'єктів (якорів)
  const darkBlobs = [];
  const visited = new Uint8Array(W * H);

  for (let y = 6; y < H - 6; y += 4) {
    for (let x = 6; x < W - 6; x += 4) {
      if (lum(x, y) < THRESH && !visited[y * W + x]) {
        const queue = [[x, y]];
        let sx = 0, sy = 0, cnt = 0;
        while (queue.length && cnt < 1200) {
          const [cx, cy] = queue.shift();
          if (cx < 0 || cx >= W || cy < 0 || cy >= H || visited[cy * W + cx] || lum(cx, cy) >= THRESH) continue;
          visited[cy * W + cx] = 1;
          sx += cx; sy += cy; cnt++;
          queue.push([cx + 4, cy], [cx - 4, cy], [cx, cy + 4], [cx, cy - 4]);
        }
        if (cnt > 6 && cnt < 1200) {
          darkBlobs.push({ x: sx / cnt, y: sy / cnt, size: cnt });
        }
      }
    }
  }

  darkBlobs.sort((a, b) => b.size - a.size);
  if (darkBlobs.length < 3) {
    ctx.clearRect(0, 0, W, H);
    setDecStatus('Шукаю трикутник лінз...', '');
    return;
  }

  // Знаходимо найкращий рівнобедрений трикутник
  const candidates = darkBlobs.slice(0, Math.min(10, darkBlobs.length));
  let bestTriangle = null, bestScore = Infinity;

  for (let a = 0; a < candidates.length; a++) {
    for (let b = a + 1; b < candidates.length; b++) {
      for (let c = b + 1; c < candidates.length; c++) {
        const pa = candidates[a], pb = candidates[b], pc = candidates[c];
        const d1 = dist(pa, pb), d2 = dist(pb, pc), d3 = dist(pa, pc);
        const avg = (d1 + d2 + d3) / 3;
        if (avg < 40) continue;
        const score = (Math.abs(d1 - avg) + Math.abs(d2 - avg) + Math.abs(d3 - avg)) / avg;
        if (score < bestScore && score < 0.25) {
          bestScore = score;
          bestTriangle = [pa, pb, pc];
        }
      }
    }
  }

  if (!bestTriangle) {
    ctx.clearRect(0, 0, W, H);
    setDecStatus('Аналізую геометрію...', '');
    return;
  }

  const [pa, pb, pc] = bestTriangle;
  const cx = (pa.x + pb.x + pc.x) / 3;
  const cy = (pa.y + pb.y + pc.y) / 3;

  // Визначаємо нижній якір (той, у якого найбільша координата Y)
  const bottomAnchor = [pa, pb, pc].reduce((best, p) => p.y > best.y ? p : best);
  const baseSide = (dist(pa, pb) + dist(pb, pc) + dist(pa, pc)) / 3;

  // Обчислюємо кут повороту камери відносно нижнього кута
  const currentRotation = Math.atan2(bottomAnchor.y - cy, bottomAnchor.x - cx);

  ctx.clearRect(0, 0, W, H);

  // Малюємо трикутник позиціонування
  ctx.strokeStyle = 'rgba(0, 0, 255, 0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.lineTo(pc.x, pc.y); ctx.closePath(); ctx.stroke();

  // Радіуси нашої ідеальної «матрьошки» відносно сторони трикутника
  const radarCircleR = baseSide * (128 / 310); // Зовнішнє коло-радар
  const baseCircleR  = baseSide * (68 / 310);  // Внутрішнє базове коло-екватор

  const bits = [];

  // ЗАКУСКА РАДАРУ: 16 кроків по 22.5 градусів, старт з нижнього кута
  for (let i = 0; i < N_DATA; i++) {
    const angleFromStart = (i / N_DATA) * Math.PI * 2;
    const globalAngle = currentRotation + angleFromStart;

    let foundDark = false;
    let edgeX = cx, edgeY = cy;

    // Промінь радара стріляє із ЗОВНІШНЬОГО КОЛА всередину до центру
    for (let d = radarCircleR; d >= 5; d -= 2) {
      const px = cx + Math.cos(globalAngle) * d;
      const py = cy + Math.sin(globalAngle) * d;

      // Перевірка суцільності (фільтр поодиноких брудних бризок)
      if (lum(px, py) < THRESH * 1.05) {
        let dense = 0;
        if (lum(px+1, py) < THRESH * 1.05) dense++;
        if (lum(px-1, py) < THRESH * 1.05) dense++;
        if (lum(px, py+1) < THRESH * 1.05) dense++;
        if (lum(px, py-1) < THRESH * 1.05) dense++;

        if (dense >= 2) { // Реагуємо тільки на суцільне тіло клякси
          foundDark = true;
          edgeX = px;
          edgeY = py;
          
          // Рахуємо фінальну відстань від центру до контуру герою
          const finalDistToCenter = d;

          // РІШЕННЯ: Якщо контур зустрівся далі ніж базове коло — це виступ (1)
          if (finalDistToCenter > baseCircleR) {
            bits.push(1);
          } else {
            bits.push(0);
          }
          break;
        }
      }
    }

    if (!foundDark) {
      bits.push(0); // Якщо промінь взагалі пройшов у порожнечу — це 0
    }

    // Візуалізація точок радара (Червоний = 1, Зелений = 0)
    ctx.fillStyle = bits[bits.length - 1] === 1 ? '#ff0000' : '#00ff00';
    ctx.beginPath(); ctx.arc(edgeX, edgeY, 3.5, 0, Math.PI * 2); ctx.fill();
  }

  // Перетворюємо масив 16 біт у підсумковий ID
  let id = 0;
  for (let i = 0; i < 16; i++) id = (id << 1) | bits[i];

  const phrase = DB[id];
  if (phrase) {
    setDecStatus(`✓ Розпізнано Персонажа! ID: ${id}`, phrase);
    if (lastLoggedId !== id) {
      logMsg(`[HERO FOUND] ID: ${id} -> "${phrase.substring(0,22)}..."`);
      lastLoggedId = id;
    }
  } else {
    setDecStatus(`Зчитано ID Клякси: ${id}`, '');
    if (lastLoggedId !== id && id !== 0) {
      logMsg(`[SCAN] Нова форма ID: ${id} (немає в базі фраз)`);
      lastLoggedId = id;
    }
  }
}

function setDecStatus(status, phrase) {
  const st = document.getElementById('decStatus');
  const ph = document.getElementById('decPhrase');
  st.className = phrase ? 'status ok' : 'status';
  st.textContent = status;
  ph.textContent = phrase ? `"${phrase}"` : '';
}

function dist(a, b) { return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }

function logMsg(msg) {
  const lb = document.getElementById('logBody');
  const time = new Date().toLocaleTimeString();
  if (lb.textContent.includes('--- Очікування камери ---')) lb.textContent = '';
  lb.textContent += `[${time}] ${msg}\n`;
  lb.scrollTop = lb.scrollHeight;
}

function clearLog() { document.getElementById('logBody').textContent = ''; lastLoggedId = null; }

function copyLog() {
  navigator.clipboard.writeText(document.getElementById('logBody').textContent).then(() => {
    alert('Лог скопійовано!');
  });
}

function renderDB() {
  document.getElementById('dbList').innerHTML = Object.entries(DB)
    .sort((a,b) => +a[0]-+b[0])
    .map(([id,phrase]) =>
      `<div class="db-entry">
        <span class="eid">#${id}</span>
        <span class="etxt">${phrase}</span>
        <button onclick="deleteEntry(${id})">✕</button>
      </div>`
    ).join('');
}

function addEntry() {
  const id = parseInt(document.getElementById('newId').value);
  const phrase = document.getElementById('newPhrase').value.trim();
  if (isNaN(id)||id<0||id>65535||!phrase) return;
  DB[id] = phrase;
  document.getElementById('newId').value = '';
  document.getElementById('newPhrase').value = '';
  renderDB();
}

function deleteEntry(id) { delete DB[id]; renderDB(); }

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['enc','dec','db'][i]===name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name !== 'dec') stopCam();
}

renderDB();
encode();
</script>
